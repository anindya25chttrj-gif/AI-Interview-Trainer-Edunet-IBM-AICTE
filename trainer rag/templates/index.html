<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Interview Trainer</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      background: #ffffff;
      color: #111111;
    }

    /* ── Layout shell ──────────────────────────────────────────────────────── */
    .shell {
      display: grid;
      grid-template-columns: 320px 1fr;
      grid-template-rows: 56px 1fr;
      height: 100vh;
    }

    /* ── Top bar ───────────────────────────────────────────────────────────── */
    .topbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      padding: 0 24px;
      border-bottom: 1px solid #111111;
      background: #111111;
      color: #ffffff;
    }
    .topbar h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .topbar span {
      margin-left: 12px;
      font-size: 11px;
      color: #aaaaaa;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
    }

    /* ── Left panel — Resume ───────────────────────────────────────────────── */
    .panel-resume {
      border-right: 1px solid #111111;
      display: flex;
      flex-direction: column;
      background: #f7f8fa;
      overflow: hidden;
    }
    .panel-resume .panel-header {
      padding: 12px 16px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid #d0d0d0;
      color: #444444;
      background: #efefef;
    }
    #resume-input {
      flex: 1;
      width: 100%;
      border: none;
      resize: none;
      background: #f7f8fa;
      color: #111111;
      font-family: inherit;
      font-size: 13px;
      line-height: 1.7;
      padding: 16px;
      outline: none;
    }
    #resume-input::placeholder { color: #aaaaaa; }

    /* ── Right panel — Chat ────────────────────────────────────────────────── */
    .panel-chat {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Chat log */
    #chat-log {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Individual message rows */
    .msg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 760px;
      width: 100%;
    }
    .msg .label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #888888;
    }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.user .label { color: #444444; }

    .msg .bubble {
      padding: 12px 16px;
      border: 1px solid #d0d0d0;
      background: #ffffff;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: #111111;
      color: #ffffff;
      border-color: #111111;
    }
    .msg.assistant .bubble { background: #f7f8fa; }

    /* Markdown rendering inside bubbles */
    .bubble strong { font-weight: 700; }
    .bubble em     { font-style: italic; }
    .bubble ul, .bubble ol {
      padding-left: 20px;
      margin: 6px 0;
    }
    .bubble li { margin: 3px 0; }
    .bubble code {
      font-family: "Consolas", "Menlo", monospace;
      background: #e8e8e8;
      padding: 1px 5px;
      font-size: 12.5px;
    }
    .bubble pre {
      background: #e8e8e8;
      padding: 10px 14px;
      overflow-x: auto;
      font-size: 12.5px;
      margin: 8px 0;
    }
    .bubble pre code { background: none; padding: 0; }
    .bubble h1, .bubble h2, .bubble h3 {
      font-weight: 700;
      margin: 8px 0 4px;
      line-height: 1.3;
    }
    .bubble h1 { font-size: 17px; }
    .bubble h2 { font-size: 15px; }
    .bubble h3 { font-size: 14px; }
    .bubble hr { border: none; border-top: 1px solid #cccccc; margin: 10px 0; }

    /* Typing indicator */
    .typing-indicator .bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 16px;
    }
    .typing-indicator .dot {
      width: 7px;
      height: 7px;
      background: #888888;
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }
    .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40%           { opacity: 1;   }
    }

    /* Input bar */
    .input-bar {
      border-top: 1px solid #111111;
      display: flex;
      align-items: flex-end;
      gap: 0;
      background: #ffffff;
    }
    #user-input {
      flex: 1;
      border: none;
      resize: none;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.6;
      padding: 14px 16px;
      color: #111111;
      background: #ffffff;
      outline: none;
      min-height: 52px;
      max-height: 160px;
    }
    #user-input::placeholder { color: #aaaaaa; }
    #send-btn {
      width: 64px;
      min-height: 52px;
      border: none;
      border-left: 1px solid #111111;
      background: #111111;
      color: #ffffff;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      transition: background 0.15s;
    }
    #send-btn:hover:not(:disabled) { background: #333333; }
    #send-btn:disabled {
      background: #888888;
      cursor: not-allowed;
    }
    /* Custom Responsive Overrides for Mobile Views */
/* Custom Responsive Overrides for Mobile Views */
    @media (max-width: 768px) {
        /* Deconstruct the fixed desktop layout grid into a single responsive column flow */
        .shell {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Keep the top header bar standard size */
        .topbar {
            height: 56px;
            flex-shrink: 0;
            padding: 0 16px;
        }

        /* Stack the resume upload box on top and let it adapt to the width */
        .panel-resume {
            width: 100% !important;
            height: auto !important;
            border-right: none !important;
            border-bottom: 1px solid #111111;
            flex-shrink: 0;
        }

        /* Expand the chat room container to dynamically fill the remaining view height */
        .panel-chat {
            flex: 1;
            height: auto !important;
            overflow: hidden;
        }

        /* Allow chat bubbles to adapt better to narrower screens */
        #chat-log {
            padding: 16px;
        }

        .msg {
            max-width: 100%;
        }

        /* Pin the bottom message typing bar firmly above the virtual phone keyboard */
        .input-bar {
            position: sticky;
            bottom: 0;
            width: 100%;
            z-index: 100;
            background: #ffffff;
        }
    }
  </style>
</head>
<body>

<div class="shell">

  <!-- Top bar -->
  <header class="topbar">
    <h1>AI Interview Trainer</h1>
    <span>Powered by watsonx.ai · Llama 3.3 70B · RAG Pipeline</span>
  </header>

  <!-- Left — Resume panel -->
  <aside class="panel-resume">
  <div class="panel-header">Candidate Resume Ingestion</div>
  <div style="padding: 20px; display: flex; flex-direction: column; gap: 15px;">
    <p style="font-size: 13px; color: #888; margin: 0;">
      Upload your raw resume PDF directly. The system will parse its layout structure dynamically.
    </p>
    
    <!-- Clean, native file input field -->
    <input 
      type="file" 
      id="resumeFile" 
      accept=".pdf" 
      style="color: #fff; font-size: 13px;"
    />
    
    <!-- Status indicator for the user -->
    <div id="uploadStatus" style="font-size: 12px; color: #4caf50;"></div>
  </div>
</aside>
  <!-- Right — Chat panel -->
  <section class="panel-chat">
    <div id="chat-log" role="log" aria-live="polite"></div>
    <div class="input-bar">
      <textarea
        id="user-input"
        rows="1"
        placeholder="Ask a question, request mock interview feedback, or get resume tips…"
      ></textarea>
      <button id="send-btn" type="button">Send</button>
    </div>
  </section>

</div>

<script>
/* ── Minimal markdown renderer ─────────────────────────────────────────── */
  function renderMarkdown(raw) {
    let html = raw
      // Code blocks (must come before inline code)
      .replace(/```([\s\S]*?)```/g, (_, code) =>
        `<pre><code>${escapeHtml(code.trim())}</code></pre>`)
      // Inline code
      .replace(/`([^`]+)`/g, (_, code) =>
        `<code>${escapeHtml(code)}</code>`)
      // Headings
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm,  '<h2>$1</h2>')
      .replace(/^# (.+)$/gm,   '<h1>$1</h1>')
      // Horizontal rule
      .replace(/^---$/gm, '<hr>')
      // Bold
      .replace(/\*\*(.+?)\*\"/g, '<strong>$1</strong>')
      // Italic
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      // Unordered list items
      .replace(/^\s*[-*] (.+)$/gm, '<li>$1</li>')
      // Ordered list items
      .replace(/^\s*\d+\. (.+)$/gm, '<li>$1</li>')
      // Wrap consecutive <li> in <ul>
      .replace(/(<li>[\s\S]+?<\/li>)(?!\s*<li>)/g, '<ul>$1</ul>')
      // Line breaks → <br> (skip if inside block elements)
      .replace(/(?<!>)\n(?!<)/g, '<br>');
    return html;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  /* ── DOM helpers ────────────────────────────────────────────────────────── */
  const chatLog   = document.getElementById('chat-log');
  const userInput = document.getElementById('user-input');
  const sendBtn   = document.getElementById('send-btn');
  
  // Target your updated file upload field from the side panel
  const fileInput = document.getElementById('resumeFile');
  const statusBox = document.getElementById('uploadStatus');

  function appendMessage(role, htmlContent, id) {
    const wrapper = document.createElement('div');
    wrapper.classList.add('msg', role);
    if (id) wrapper.id = id;

    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = role === 'user' ? 'You' : 'Interview Trainer';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = htmlContent;

    wrapper.appendChild(label);
    wrapper.appendChild(bubble);
    chatLog.appendChild(wrapper);
    chatLog.scrollTop = chatLog.scrollHeight;
    return wrapper;
  }

  function removeElement(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  /* ── Auto-grow textarea ─────────────────────────────────────────────────── */
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 160) + 'px';
  });

  /* ── Submit on Enter (Shift+Enter = new line) ──────────────────────────── */
  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendBtn.click();
    }
  });

  /* ── Update UI Status Text on File Selection ────────────────────────────── */
  if (fileInput) {
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) {
        statusBox.textContent = `📎 Loaded: ${fileInput.files[0].name}`;
        statusBox.style.color = '#4caf50';
      } else {
        statusBox.textContent = '';
      }
    });
  }

  /* ── Send message ───────────────────────────────────────────────────────── */
  async function sendMessage() {
    const message = userInput.value.trim();
    if (!message) return;

    // Render user bubble
    appendMessage('user', escapeHtml(message).replace(/\n/g, '<br>'));
    userInput.value = '';
    userInput.style.height = 'auto';

    // Typing indicator
    appendMessage(
      'assistant',
      '<span class="dot"></span><span class="dot"></span><span class="dot"></span>',
      'typing'
    );
    document.querySelector('#typing').classList.add('typing-indicator');

    sendBtn.disabled = true;

    // Build the dynamic Multipart stream payload
    const formData = new FormData();
    formData.append('message', message);
    
    if (fileInput && fileInput.files.length > 0) {
      formData.append('resume', fileInput.files[0]);
    }

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        // Note: Do not specify Content-Type headers when passing FormData! 
        // The browser automatically configures multipart boundaries.
        body: formData,
      });

      const data = await res.json();
      removeElement('typing');

      if (!res.ok) {
        appendMessage('assistant',
          `<strong>Error ${res.status}:</strong> ${escapeHtml(data.error || 'Unknown error')}`);
      } else {
        appendMessage('assistant', renderMarkdown(data.response || ''));
      }
    } catch (err) {
      removeElement('typing');
      appendMessage('assistant',
        `<strong>Network error:</strong> ${escapeHtml(err.message)}`);
    } finally {
      sendBtn.disabled = false;
      userInput.focus();
    }
  }

  sendBtn.addEventListener('click', sendMessage);
</script>

</body>
</html>
